<head>

<meta name="keywords" content="상사욕, 직장인 스트레스, 상사 욕해주기, 직장 스트레스 해소, 꼰대 상사, 야근 스트레스, 직장인 공감, 상사 짜증, 직장 힐링, 회사 스트레스, 퇴근 못하게 하는 상사, 공로 가로채는 상사, 직장인 위로, 스트레스 해소 사이트">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="대리욕 — 상사 욕 AI가 대신 해드립니다 🔥">
<meta name="twitter:description" content="직장인 필수. 상사 때문에 오늘도 속터졌나요? AI가 대신 욕해드립니다. 순한맛 / 중간맛 / 매운맛.">
<meta name="twitter:image" content="https://daeriyok.com/og-image.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --red: #E8200A;
    --dark-red: #9E0F03;
    --cream: #FDF6EC;
    --charcoal: #1A1A1A;
    --gray: #6B6B6B;
    --light-gray: #F0EDED;
    --steam: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }

  .logo-tag {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--red);
    font-weight: 500;
    margin-bottom: 12px;
    display: block;
  }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    color: var(--cream);
    line-height: 0.9;
    letter-spacing: -2px;
  }

  h1 span {
    color: var(--red);
    display: block;
  }

  .subtitle {
    margin-top: 16px;
    font-size: 15px;
    color: var(--gray);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* STEAM ANIMATION */
  .steam-wrap {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
    height: 36px;
    align-items: flex-end;
  }

  .steam {
    width: 6px;
    border-radius: 99px;
    background: linear-gradient(to top, var(--red), transparent);
    animation: steamRise 1.8s ease-in-out infinite;
    opacity: 0;
  }
  .steam:nth-child(1) { height: 28px; animation-delay: 0s; }
  .steam:nth-child(2) { height: 36px; animation-delay: 0.3s; }
  .steam:nth-child(3) { height: 22px; animation-delay: 0.6s; }
  .steam:nth-child(4) { height: 32px; animation-delay: 0.15s; }
  .steam:nth-child(5) { height: 20px; animation-delay: 0.45s; }

  @keyframes steamRise {
    0% { opacity: 0; transform: translateY(0); }
    30% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  /* MAIN CARD */
  .card {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .input-section {
    background: #242424;
    border-radius: 16px;
    padding: 28px;
    border: 1px solid #333;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  /* SITUATION CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .chip {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 7px 14px;
    border-radius: 99px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--red); color: var(--cream); }
  .chip.active { background: var(--red); border-color: var(--red); color: white; font-weight: 500; }

  textarea {
    width: 100%;
    background: #1A1A1A;
    border: 1px solid #383838;
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 16px;
    resize: none;
    height: 110px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  textarea::placeholder { color: #555; }
  textarea:focus { border-color: var(--red); }

  /* INTENSITY */
  .intensity-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .intensity-btn {
    flex: 1;
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid #444;
    background: transparent;
    color: #888;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .intensity-btn:hover { border-color: #666; color: var(--cream); }
  .intensity-btn.active { background: var(--dark-red); border-color: var(--red); color: white; font-weight: 700; }

  /* SUBMIT */
  .submit-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .submit-btn:hover { background: #c41a08; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(1px); }
  .submit-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

  /* RESULT */
  .result-box {
    display: none;
    margin-top: 20px;
    background: #1a0a08;
    border: 1px solid var(--dark-red);
    border-radius: 14px;
    padding: 24px;
    position: relative;
  }
  .result-box.visible { display: block; animation: popIn 0.3s ease; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--red);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .result-text {
    font-size: 17px;
    line-height: 1.9;
    color: var(--cream);
    font-weight: 400;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .action-btn {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #444;
    background: transparent;
    color: #aaa;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--red); color: var(--cream); }

  /* COMFORT BOX */
  .comfort-box {
    display: none;
    margin-top: 12px;
    background: #0d1a14;
    border: 1px solid #1e4d32;
    border-radius: 14px;
    padding: 20px 24px;
  }
  .comfort-box.visible { display: block; animation: popIn 0.4s ease 0.15s both; }

  .comfort-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #3d9e65;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .comfort-text {
    font-size: 15px;
    line-height: 1.85;
    color: #b8dfc9;
    font-weight: 300;
    white-space: pre-wrap;
    word-break: keep-all;
  }


  /* SHARE BUTTON */
  .share-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .share-btn {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #444;
    background: transparent;
    color: #aaa;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .share-btn:hover { border-color: var(--red); color: var(--cream); }
  .share-btn.kakao { border-color: #3A1D1D; color: #F9E000; }
  .share-btn.kakao:hover { background: #3A2E00; border-color: #F9E000; }
  .share-btn.twitter { border-color: #1a2a3a; color: #1d9bf0; }
  .share-btn.twitter:hover { background: #0d1825; border-color: #1d9bf0; }
  .share-btn.link { border-color: #2a2a3a; color: #aaa; }
  .share-btn.link:hover { border-color: #888; color: var(--cream); }

  /* LOADING */
  .loading-dots {
    display: none;
    justify-content: center;
    gap: 6px;
    padding: 8px 0;
  }
  .loading-dots.visible { display: flex; }
  .dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: bounce 0.8s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* DISCLAIMER */
  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 28px;
    line-height: 1.7;
  }

  /* COUNTER */
  .rage-counter {
    text-align: center;
    margin-bottom: 28px;
    padding: 16px;
    border-top: 1px solid #2a2a2a;
    border-bottom: 1px solid #2a2a2a;
  }
  .counter-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    color: var(--red);
  }
  .counter-label {
    font-size: 12px;
    color: #555;
    margin-top: 2px;
  }

</style>
</head>
<body>

<header>
  <span class="logo-tag">직장인 스트레스 해소 전문</span>
  <h1>대리<span>욕</span></h1>
  <p class="subtitle">상사 때문에 터질 것 같을 때 — 저희가 대신 해드립니다</p>
  <div class="steam-wrap">
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
  </div>
</header>

<div class="card">
  <div class="rage-counter">
    <div class="counter-num" id="sessionCount">0</div>
    <div class="counter-label">이번 세션 분노 해소 횟수 🔥</div>
  </div>

  <div class="input-section">
    <label>어떤 상황이에요?</label>
    <div class="chips" id="chips">
      <button class="chip" data-val="야근 강요">야근 강요</button>
      <button class="chip" data-val="공로 가로채기">공로 가로채기</button>
      <button class="chip" data-val="말 바꾸기">말 바꾸기</button>
      <button class="chip" data-val="꼰대 훈수">꼰대 훈수</button>
      <button class="chip" data-val="회의 중 무시">회의 중 무시</button>
      <button class="chip" data-val="퇴근 전 일 던지기">퇴근 전 일 던지기</button>
      <button class="chip" data-val="감정 기복">감정 기복</button>
      <button class="chip" data-val="가스라이팅">가스라이팅</button>
    </div>

    <label>더 자세히 말해줘요 (선택)</label>
    <textarea id="situation" placeholder="오늘 있었던 일을 털어놓으세요. 판단 없이 다 들어요..."></textarea>

    <label>욕 강도</label>
    <div class="intensity-row">
      <button class="intensity-btn" data-level="mild">😤 순한맛</button>
      <button class="intensity-btn active" data-level="medium">😡 중간맛</button>
      <button class="intensity-btn" data-level="spicy">🤬 매운맛</button>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="generateRage()">
      🔥 대신 욕해줘
    </button>

    <div class="loading-dots" id="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-label">💢 대리욕 완성</div>
      <div class="result-text" id="resultText"></div>
      <div class="result-actions">
        <button class="action-btn" onclick="copyResult(this)">📋 복사하기</button>
        <button class="action-btn" onclick="generateRage()">🔄 다시 해줘</button>
      </div>
    </div>

    <div class="comfort-box" id="comfortBox">
      <div class="comfort-label">🌿 그래도 괜찮아요</div>
      <div class="comfort-text" id="comfortText"></div>
    </div>

    <div class="share-row" id="shareRow" style="display:none;">
      <button class="share-btn kakao" onclick="shareKakao(this)">💬 카톡용 복사</button>
      <button class="share-btn twitter" onclick="shareTwitter()">𝕏 트위터</button>
      <button class="share-btn link" onclick="copyLink(this)">🔗 링크 복사</button>
    </div>
  </div>

  <p class="disclaimer">
    이 사이트는 스트레스 해소를 위한 픽션입니다.<br>
    실제로 사용하면 진짜로 잘려요. 마음속으로만 🤫
  </p>
</div>

<script>
let selectedChips = [];
let selectedLevel = 'medium';
let sessionCount = 0;

// Chip selection
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chip.classList.toggle('active');
    const val = chip.dataset.val;
    if (selectedChips.includes(val)) {
      selectedChips = selectedChips.filter(v => v !== val);
    } else {
      selectedChips.push(val);
    }
  });
});

// Intensity selection
document.querySelectorAll('.intensity-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.intensity-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLevel = btn.dataset.level;
  });
});

function getLevelPrompt(level) {
  if (level === 'mild') return '정중하고 품위 있지만 날카롭게, 직접적인 욕설 없이 비꼬는 방식으로';
  if (level === 'medium') return '적당히 감칠맛 나는 욕설과 비유를 섞어서, 너무 심하지 않게';
  return '진짜 폭발 직전의 분노로, 쌍욕에 가까운 강한 표현을 마음껏 써서 속이 다 뻥 뚫리게. "이 개XX이", "X발", "X같은", "진짜 미치겠다" 수준의 표현을 써도 됨. 검열 없이 시원하게';
}

const comfortPrompt = `당신은 지친 직장인을 따뜻하게 위로해주는 존재입니다.
아래 상황에 처한 사람에게 짧고 따뜻한 위로 한 마디를 건네주세요.
- 2~3문장, 진심 어린 말투로
- 공감 먼저, 그 다음 응원
- "당신 잘못 아니에요"처럼 명확하게
위로 문장만 출력하세요.`;

async function getComfort(contextParts) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 300,
      messages: [{ role: "user", content: comfortPrompt + "\n\n상황: " + contextParts.join(', ') }]
    })
  });
  const data = await response.json();
  return data.content?.map(i => i.text || '').join('') || '';
}

async function generateRage() {
  const situation = document.getElementById('situation').value.trim();
  const chips = selectedChips.join(', ');

  if (!situation && chips.length === 0) {
    document.getElementById('situation').placeholder = '상황을 선택하거나 직접 적어주세요! 😤';
    document.getElementById('situation').focus();
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');
  const resultBox = document.getElementById('resultBox');

  submitBtn.disabled = true;
  submitBtn.textContent = '분노 충전 중...';
  loading.classList.add('visible');
  resultBox.classList.remove('visible');
  document.getElementById('comfortBox').classList.remove('visible');
  document.getElementById('shareRow').style.display = 'none';

  const contextParts = [];
  if (chips) contextParts.push(`상황 유형: ${chips}`);
  if (situation) contextParts.push(`구체적 상황: ${situation}`);

  const levelGuide = getLevelPrompt(selectedLevel);

  const prompt = `당신은 직장인들의 스트레스를 대신 풀어주는 "대리욕" 서비스입니다.

아래 상황에 처한 직장인을 위해 상사에 대한 욕과 분노를 대신 표현해주세요.

${contextParts.join('\n')}

지침:
- ${levelGuide} 표현해주세요
- 한국 직장 문화 특유의 공감 포인트를 담아주세요
- 3~5문장 정도로, 리듬감 있고 숨 막히게 시원하게 써주세요
- 읽는 사람이 "맞아 맞아! 시원하다!" 라고 느낄 수 있게
- 순한맛: 비꼼과 풍자 위주 (직접 욕설 없이)
- 중간맛: "이 양반아", "제발", "진짜" 같은 표현 포함
- 매운맛: 쌍욕 포함한 강한 표현 마음껏 허용, 검열 없이
- 실제 폭력 위협이나 신체 해를 끼치는 내용은 제외
- 어투는 격앙된 혼잣말처럼, 공감 가는 말투로
- 위로는 절대 넣지 말 것. 욕과 분노 표현만

욕 결과만 출력하세요. 다른 설명 없이.`;

  try {
    const [rageRes, comfortText] = await Promise.all([
      fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      }),
      getComfort(contextParts)
    ]);

    const rageData = await rageRes.json();
    const rageText = rageData.content?.map(i => i.text || '').join('') || '잠시 후 다시 시도해주세요.';

    document.getElementById('resultText').textContent = rageText;
    resultBox.classList.add('visible');

    document.getElementById('comfortText').textContent = comfortText;
    document.getElementById('comfortBox').classList.add('visible');
    document.getElementById('shareRow').style.display = 'flex';

    sessionCount++;
    document.getElementById('sessionCount').textContent = sessionCount;

  } catch (err) {
    document.getElementById('resultText').textContent = '잠시 연결이 끊겼어요 😤\n잠깐 후 다시 눌러주세요. 그 상사에 대한 욕은 준비돼 있습니다.';
    resultBox.classList.add('visible');
    document.getElementById('comfortBox').classList.remove('visible');
    document.getElementById('shareRow').style.display = 'none';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🔥 대신 욕해줘';
    loading.classList.remove('visible');
  }
}

function copyResult(btn) {
  const text = document.getElementById('resultText').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ 복사됨!';
      setTimeout(() => { btn.textContent = '📋 복사하기'; }, 1500);
    }).catch(() => {
      fallbackCopy(text, btn);
    });
  } else {
    fallbackCopy(text, btn);
  }
}


function shareKakao(btn) {
  const text = document.getElementById('resultText').textContent;
  const msg = '🔥 대리욕이 대신 욕해줬다\n\n' + text + '\n\n👉 나도 해보기: https://daeriyok.com';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(() => {
      btn.textContent = '✅ 복사됨! 카톡에 붙여넣기';
      setTimeout(() => { btn.textContent = '💬 카톡용 복사'; }, 2500);
    }).catch(() => kakaoFallback(msg, btn));
  } else {
    kakaoFallback(msg, btn);
  }
}

function kakaoFallback(msg, btn) {
  const ta = document.createElement('textarea');
  ta.value = msg;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = '✅ 복사됨! 카톡에 붙여넣기';
    setTimeout(() => { btn.textContent = '💬 카톡용 복사'; }, 2500);
  } catch(e) {
    btn.textContent = '❌ 직접 복사해주세요';
    setTimeout(() => { btn.textContent = '💬 카톡용 복사'; }, 2000);
  }
  document.body.removeChild(ta);
}

function shareTwitter() {
  const text = document.getElementById('resultText').textContent;
  const tweet = '🔥 대리욕이 상사 욕 대신 해줬다\n\n' + text.slice(0, 80) + '...\n\n#직장인 #상사 #스트레스해소\n👉 https://daeriyok.com';
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(tweet), '_blank');
}

function copyLink(btn) {
  const url = 'https://daeriyok.com';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✅ 링크 복사됨!';
      setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 1500);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 링크 복사됨!';
    setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 1500);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => { btn.textContent = '📋 복사하기'; }, 1500);
  } catch(e) {
    btn.textContent = '❌ 직접 복사해주세요';
    setTimeout(() => { btn.textContent = '📋 복사하기'; }, 2000);
  }
  document.body.removeChild(ta);
}
