<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --red: #E8200A; --dark-red: #9E0F03; --cream: #FDF6EC;
  --charcoal: #1A1A1A; --gray: #6B6B6B; --surface: #242424;
  --border: #2e2e2e; --green: #22c55e; --green-dim: #0d2a18;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--charcoal); color:var(--cream); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

/* NAV */
nav { display:flex; justify-content:center; gap:0; border-bottom:1px solid var(--border); sticky; top:0; background:var(--charcoal); z-index:100; }
.nav-btn { flex:1; max-width:200px; padding:16px 0; background:transparent; border:none; color:#666; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.nav-btn.active { color:var(--cream); border-bottom-color:var(--red); }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* ===== GENERATOR PAGE ===== */
header { text-align:center; padding:40px 24px 28px; }
.logo-tag { font-size:11px; letter-spacing:4px; color:var(--red); font-weight:500; margin-bottom:12px; display:block; }
h1 { font-family:'Black Han Sans',sans-serif; font-size:clamp(48px,10vw,88px); color:var(--cream); line-height:0.9; letter-spacing:-2px; }
h1 span { color:var(--red); display:block; }
.subtitle { margin-top:14px; font-size:14px; color:var(--gray); font-weight:300; }
.steam-wrap { display:flex; justify-content:center; gap:8px; margin:16px 0; height:32px; align-items:flex-end; }
.steam { width:6px; border-radius:99px; background:linear-gradient(to top,var(--red),transparent); animation:steamRise 1.8s ease-in-out infinite; opacity:0; }
.steam:nth-child(1){height:28px;animation-delay:0s}
.steam:nth-child(2){height:36px;animation-delay:.3s}
.steam:nth-child(3){height:22px;animation-delay:.6s}
.steam:nth-child(4){height:32px;animation-delay:.15s}
.steam:nth-child(5){height:20px;animation-delay:.45s}
@keyframes steamRise { 0%{opacity:0;transform:translateY(0)} 30%{opacity:.8} 100%{opacity:0;transform:translateY(-20px)} }
.card { max-width:640px; margin:0 auto; padding:0 20px 60px; }
.rage-counter { text-align:center; margin-bottom:24px; padding:14px; border-top:1px solid #2a2a2a; border-bottom:1px solid #2a2a2a; }
.counter-num { font-family:'Black Han Sans',sans-serif; font-size:28px; color:var(--red); }
.counter-label { font-size:12px; color:#555; margin-top:2px; }
.input-section { background:var(--surface); border-radius:16px; padding:24px; border:1px solid var(--border); }
label { display:block; font-size:12px; font-weight:500; color:var(--gray); letter-spacing:1px; margin-bottom:10px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.chip { background:transparent; border:1px solid #444; color:#aaa; padding:7px 14px; border-radius:99px; font-size:13px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; }
.chip:hover { border-color:var(--red); color:var(--cream); }
.chip.active { background:var(--red); border-color:var(--red); color:white; font-weight:500; }
textarea { width:100%; background:#1A1A1A; border:1px solid #383838; border-radius:10px; color:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:15px; line-height:1.7; padding:16px; resize:none; height:110px; outline:none; transition:border-color 0.2s; margin-bottom:16px; }
textarea::placeholder { color:#555; }
textarea:focus { border-color:var(--red); }
.intensity-row { display:flex; gap:8px; margin-bottom:20px; }
.intensity-btn { flex:1; padding:9px 0; border-radius:8px; border:1px solid #444; background:transparent; color:#888; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.intensity-btn:hover { border-color:#666; color:var(--cream); }
.intensity-btn.active { background:var(--dark-red); border-color:var(--red); color:white; font-weight:700; }
.submit-btn { width:100%; background:var(--red); color:white; border:none; border-radius:12px; padding:18px; font-family:'Black Han Sans',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
.submit-btn:hover { background:#c41a08; transform:translateY(-1px); }
.submit-btn:active { transform:translateY(1px); }
.submit-btn:disabled { background:#555; cursor:not-allowed; transform:none; }
.loading-dots { display:none; justify-content:center; gap:6px; padding:8px 0; }
.loading-dots.visible { display:flex; }
.dot { width:8px; height:8px; background:var(--red); border-radius:50%; animation:bounce 0.8s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-6px);opacity:1} }
.result-box { display:none; margin-top:20px; background:#1a0a08; border:1px solid var(--dark-red); border-radius:14px; padding:24px; }
.result-box.visible { display:block; animation:popIn 0.3s ease; }
@keyframes popIn { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
.result-label { font-size:10px; letter-spacing:3px; color:var(--red); font-weight:700; margin-bottom:12px; }
.result-text { font-size:16px; line-height:1.9; color:var(--cream); white-space:pre-wrap; word-break:keep-all; }
.result-actions { display:flex; gap:10px; margin-top:18px; }
.action-btn { flex:1; padding:11px; border-radius:8px; border:1px solid #444; background:transparent; color:#aaa; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.action-btn:hover { border-color:var(--red); color:var(--cream); }
.comfort-box { display:none; margin-top:12px; background:#0d1a14; border:1px solid #1e4d32; border-radius:14px; padding:20px 24px; }
.comfort-box.visible { display:block; animation:popIn 0.4s ease 0.15s both; }
.comfort-label { font-size:10px; letter-spacing:3px; color:#3d9e65; font-weight:700; margin-bottom:10px; }
.comfort-text { font-size:15px; line-height:1.85; color:#b8dfc9; font-weight:300; white-space:pre-wrap; word-break:keep-all; }
.share-row { display:flex; gap:8px; margin-top:10px; display:none; }
.share-btn { flex:1; padding:11px; border-radius:8px; border:1px solid #444; background:transparent; color:#aaa; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.share-btn:hover { border-color:var(--red); color:var(--cream); }
.share-btn.kakao { border-color:#3A1D1D; color:#F9E000; }
.share-btn.kakao:hover { background:#3A2E00; border-color:#F9E000; }
.share-btn.twitter { border-color:#1a2a3a; color:#1d9bf0; }
.share-btn.twitter:hover { background:#0d1825; border-color:#1d9bf0; }
/* 게시하기 버튼 */
.post-to-community { width:100%; margin-top:10px; padding:13px; border-radius:10px; border:1px solid var(--red); background:rgba(232,32,10,0.08); color:var(--red); font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; display:none; }
.post-to-community:hover { background:rgba(232,32,10,0.18); }
.disclaimer { text-align:center; font-size:11px; color:#444; margin-top:28px; line-height:1.7; }

/* ===== COMMUNITY PAGE ===== */
.community-wrap { max-width:680px; margin:0 auto; padding:24px 20px 60px; }
.community-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.community-title { font-family:'Black Han Sans',sans-serif; font-size:24px; }
.community-title span { color:var(--red); }
.live-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:#3d9e65; background:var(--green-dim); border:1px solid #1e4d32; padding:5px 12px; border-radius:99px; }
.live-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 정렬/필터 */
.filter-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border-radius:99px; border:1px solid #444; background:transparent; color:#888; font-family:'Noto Sans KR',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s; }
.filter-btn.active { background:var(--red); border-color:var(--red); color:white; }

/* 포스트 카드 */
.post-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:14px; transition:border-color 0.2s; }
.post-card:hover { border-color:#444; }
.post-card-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.intensity-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; }
.intensity-badge.mild { background:#1a2a1a; color:#4ade80; border:1px solid #1e4d2a; }
.intensity-badge.medium { background:#2a1a0a; color:#fb923c; border:1px solid #4a2a0a; }
.intensity-badge.spicy { background:#2a0a08; color:#f87171; border:1px solid #5a1a18; }
.situation-tag { font-size:11px; padding:3px 10px; border-radius:99px; background:#2a2a2a; color:#888; border:1px solid #383838; }
.post-time { font-size:11px; color:#555; margin-left:auto; }
.post-rage { font-size:14px; line-height:1.8; color:var(--cream); margin-bottom:10px; word-break:keep-all; }
.post-rage.collapsed { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.expand-btn { font-size:12px; color:var(--red); background:none; border:none; cursor:pointer; padding:0; margin-bottom:10px; font-family:'Noto Sans KR',sans-serif; }
.post-comfort { font-size:13px; color:#7ab898; line-height:1.7; padding:10px 14px; background:#0d1a14; border-radius:8px; margin-bottom:12px; display:none; word-break:keep-all; }
.post-comfort.visible { display:block; }
.post-actions { display:flex; align-items:center; gap:10px; }
.like-btn { display:flex; align-items:center; gap:5px; padding:7px 14px; border-radius:99px; border:1px solid #444; background:transparent; color:#888; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.like-btn:hover { border-color:var(--red); color:var(--cream); }
.like-btn.liked { background:rgba(232,32,10,0.12); border-color:var(--red); color:var(--red); }
.comment-toggle { padding:7px 14px; border-radius:99px; border:1px solid #444; background:transparent; color:#888; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.comment-toggle:hover { border-color:#666; color:var(--cream); }
.report-btn { margin-left:auto; padding:6px 10px; border-radius:8px; border:none; background:transparent; color:#444; font-size:12px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
.report-btn:hover { color:#888; }

/* 댓글 */
.comments-section { display:none; margin-top:14px; border-top:1px solid var(--border); padding-top:14px; }
.comments-section.visible { display:block; }
.comment-item { padding:10px 0; border-bottom:1px solid #222; }
.comment-item:last-child { border-bottom:none; }
.comment-text { font-size:13px; color:#ccc; line-height:1.7; margin-bottom:4px; word-break:keep-all; }
.comment-time { font-size:11px; color:#555; }
.comment-input-row { display:flex; gap:8px; margin-top:12px; }
.comment-input { flex:1; background:#1a1a1a; border:1px solid #383838; border-radius:8px; color:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:13px; padding:10px 14px; outline:none; transition:border-color 0.2s; }
.comment-input:focus { border-color:var(--red); }
.comment-submit { padding:10px 16px; border-radius:8px; border:none; background:var(--red); color:white; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.comment-submit:hover { background:#c41a08; }

/* 빈 상태 */
.empty-state { text-align:center; padding:60px 20px; color:#555; }
.empty-state .big { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; line-height:1.7; }

/* 랭킹 섹션 */
.ranking-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
.ranking-title { font-family:'Black Han Sans',sans-serif; font-size:16px; margin-bottom:14px; color:var(--cream); }
.ranking-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #2a2a2a; }
.ranking-item:last-child { border-bottom:none; }
.rank-num { font-family:'Black Han Sans',sans-serif; font-size:18px; color:var(--red); min-width:24px; }
.rank-num.gold { color:#f59e0b; }
.rank-num.silver { color:#9ca3af; }
.rank-num.bronze { color:#b45309; }
.rank-text { font-size:13px; color:#ccc; flex:1; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:keep-all; }
.rank-likes { font-size:12px; color:var(--red); white-space:nowrap; }

/* 로딩 */
.spinner { display:none; text-align:center; padding:40px; color:#555; font-size:14px; }
.spinner.visible { display:block; }

/* 토스트 */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#333; color:var(--cream); padding:12px 24px; border-radius:99px; font-size:13px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="showPage('generator')">🔥 대리욕 생성</button>
  <button class="nav-btn" onclick="showPage('community')">💢 분노 게시판</button>
</nav>

<!-- ===== GENERATOR PAGE ===== -->
<div id="page-generator" class="page active">
  <header>
    <span class="logo-tag">직장인 스트레스 해소 전문</span>
    <h1>대리<span>욕</span></h1>
    <p class="subtitle">상사 때문에 터질 것 같을 때 — 저희가 대신 해드립니다</p>
    <div class="steam-wrap">
      <div class="steam"></div><div class="steam"></div><div class="steam"></div>
      <div class="steam"></div><div class="steam"></div>
    </div>
  </header>
  <div class="card">
    <div class="rage-counter">
      <div class="counter-num" id="sessionCount">0</div>
      <div class="counter-label">이번 세션 분노 해소 횟수 🔥</div>
    </div>
    <div class="input-section">
      <label>어떤 상황이에요?</label>
      <div class="chips" id="chips">
        <button class="chip" data-val="야근 강요">야근 강요</button>
        <button class="chip" data-val="공로 가로채기">공로 가로채기</button>
        <button class="chip" data-val="말 바꾸기">말 바꾸기</button>
        <button class="chip" data-val="꼰대 훈수">꼰대 훈수</button>
        <button class="chip" data-val="회의 중 무시">회의 중 무시</button>
        <button class="chip" data-val="퇴근 전 일 던지기">퇴근 전 일 던지기</button>
        <button class="chip" data-val="감정 기복">감정 기복</button>
        <button class="chip" data-val="가스라이팅">가스라이팅</button>
      </div>
      <label>더 자세히 말해줘요 (선택)</label>
      <textarea id="situation" placeholder="오늘 있었던 일을 털어놓으세요. 판단 없이 다 들어요..."></textarea>
      <label>욕 강도</label>
      <div class="intensity-row">
        <button class="intensity-btn" data-level="mild">😤 순한맛</button>
        <button class="intensity-btn active" data-level="medium">😡 중간맛</button>
        <button class="intensity-btn" data-level="spicy">🤬 매운맛</button>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="generateRage()">🔥 대신 욕해줘</button>
      <div class="loading-dots" id="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="result-box" id="resultBox">
        <div class="result-label">💢 대리욕 완성</div>
        <div class="result-text" id="resultText"></div>
        <div class="result-actions">
          <button class="action-btn" onclick="copyResult(this)">📋 복사하기</button>
          <button class="action-btn" onclick="generateRage()">🔄 다시 해줘</button>
        </div>
      </div>
      <div class="comfort-box" id="comfortBox">
        <div class="comfort-label">🌿 그래도 괜찮아요</div>
        <div class="comfort-text" id="comfortText"></div>
      </div>
      <div class="share-row" id="shareRow">
        <button class="share-btn kakao" onclick="shareKakao(this)">💬 카톡용 복사</button>
        <button class="share-btn twitter" onclick="shareTwitter()">𝕏 트위터</button>
        <button class="share-btn" onclick="copyLink(this)">🔗 링크 복사</button>
      </div>
      <button class="post-to-community" id="postBtn" onclick="postToCommunity()">
        📢 분노 게시판에 올리기
      </button>
    </div>
    <p class="disclaimer">이 사이트는 스트레스 해소를 위한 픽션입니다.<br>실제로 사용하면 진짜로 잘려요. 마음속으로만 🤫</p>
  </div>
</div>

<!-- ===== COMMUNITY PAGE ===== -->
<div id="page-community" class="page">
  <div class="community-wrap">
    <div class="community-header">
      <div class="community-title">분노 <span>게시판</span></div>
      <div class="live-badge"><div class="live-dot"></div><span id="liveCount">0</span>명 분노 중</div>
    </div>

    <!-- 랭킹 -->
    <div class="ranking-section" id="rankingSection">
      <div class="ranking-title">🏆 이번 주 레전드 욕</div>
      <div id="rankingList"><div class="spinner visible">불러오는 중...</div></div>
    </div>

    <!-- 필터 -->
    <div class="filter-row">
      <button class="filter-btn active" data-sort="latest" onclick="setSort(this,'latest')">최신순</button>
      <button class="filter-btn" data-sort="likes" onclick="setSort(this,'likes')">공감순</button>
      <button class="filter-btn" data-sort="spicy" onclick="setSort(this,'spicy')">매운맛만</button>
    </div>

async function getIpHash() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(d.ip));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
  } catch { return 'anon_' + Math.random().toString(36).slice(2,10); }
}

async function generateRage() {
  const situation=document.getElementById('situation').value.trim();
  if(!situation && selectedChips.length===0){

지침: ${getLevelPrompt(selectedLevel)} 표현하세요. 한국 직장 문화 특유의 공감 포인트를 담아서 3~5문장, 리듬감 있게. 위로는 절대 넣지 말고 욕과 분노 표현만. 실제 폭력 위협 제외. 결과만 출력.`;

function fallbackCopy(text, btn, defaultLabel) {
  const copy = () => {
    if(navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(()=>showCopied(btn,defaultLabel)).catch(execCopy);
    } else { execCopy(); }
    function execCopy(){
      const ta=document.createElement('textarea');
      ta.value=text; ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); showCopied(btn,defaultLabel); }
      catch{ btn.textContent='❌ 직접 복사해주세요'; setTimeout(()=>btn.textContent=defaultLabel,2000); }
      document.body.removeChild(ta);
    }
  };
  copy();
}
function showCopied(btn, defaultLabel) {
  const prev=btn.textContent;
  btn.textContent='✅ 복사됨!';
  setTimeout(()=>btn.textContent=defaultLabel||prev, 2000);
}

// ===== COMMUNITY =====
let currentSort='latest', currentPage=0, allLoaded=false;
const PAGE_SIZE=10;

async function loadCommunity() {
  currentPage=0; allLoaded=false;
  document.getElementById('postList').innerHTML='<div class="spinner visible">게시물 불러오는 중...</div>';
  document.getElementById('loadMore').style.display='none';
  await Promise.all([loadPosts(true), loadRanking(), loadLiveCount()]);
}

async function loadPosts(reset=false) {
  if(reset){ currentPage=0; allLoaded=false; }
  if(allLoaded) return;

  let url='posts?select=*&limit='+PAGE_SIZE+'&offset='+(currentPage*PAGE_SIZE);
  if(currentSort==='latest') url+='&order=created_at.desc';
  else if(currentSort==='likes') url+='&order=likes.desc';
  else if(currentSort==='spicy') url+='&intensity=eq.spicy&order=created_at.desc';

  try {
    const r=await api(url,{headers:{'Range-Unit':'items','Range':`${currentPage*PAGE_SIZE}-${(currentPage+1)*PAGE_SIZE-1}`}});
    const posts=await r.json();
    if(!Array.isArray(posts)) throw new Error();

    const list=document.getElementById('postList');
    if(reset) list.innerHTML='';
    if(posts.length===0 && currentPage===0){
      list.innerHTML=`<div class="empty-state"><div class="big">😶</div><p>아직 게시물이 없어요<br>첫 번째 분노를 올려보세요!</p></div>`;
      return;
    }
    posts.forEach(p=>list.insertAdjacentHTML('beforeend',renderPost(p)));
    currentPage++;
    if(posts.length<PAGE_SIZE){ allLoaded=true; document.getElementById('loadMore').style.display='none'; }
    else document.getElementById('loadMore').style.display='block';
  } catch {
    if(currentPage===0) document.getElementById('postList').innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>불러오기 실패. 잠시 후 다시 시도해주세요.</p></div>';
  }
}

async function loadRanking() {
  try {
    const r=await api('posts?select=id,rage_text,likes&order=likes.desc&limit=3&created_at=gte.'+getWeekStart());
    const posts=await r.json();
    const medals=['gold','silver','bronze'];
    const nums=['1','2','3'];
    const html=Array.isArray(posts)&&posts.length?posts.map((p,i)=>`
      <div class="ranking-item">
        <div class="rank-num ${medals[i]}">${nums[i]}</div>
        <div class="rank-text">${escHtml(p.rage_text)}</div>
        <div class="rank-likes">😤 ${p.likes}</div>
      </div>`).join(''):'<div style="color:#555;font-size:13px;">아직 공감이 없어요. 첫 공감을 눌러보세요!</div>';
    document.getElementById('rankingList').innerHTML=html;
  } catch { document.getElementById('rankingList').innerHTML=''; }
}

async function loadLiveCount() {
  try {
    const r=await api('posts?select=count&created_at=gte.'+new Date(Date.now()-3600000).toISOString(),{headers:{'Prefer':'count=exact'}});
    const count=r.headers.get('content-range')?.split('/')[1]||'0';
    document.getElementById('liveCount').textContent=count;
  } catch {}
}

function getWeekStart() {
  const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d.toISOString();
}

function renderPost(p) {
  const intensityLabel={mild:'😤 순한맛',medium:'😡 중간맛',spicy:'🤬 매운맛'}[p.intensity]||'';
  const tags=(p.situation_tags||[]).map(t=>`<span class="situation-tag">${escHtml(t)}</span>`).join('');
  const liked=likedPosts.has(p.id);
  const time=timeAgo(p.created_at);
  return `
  <div class="post-card" id="post-${p.id}">
    <div class="post-card-header">
      <span class="intensity-badge ${p.intensity}">${intensityLabel}</span>
      ${tags}
      <span class="post-time">${time}</span>
    </div>
    <div class="post-rage collapsed" id="rage-${p.id}">${escHtml(p.rage_text)}</div>
    <button class="expand-btn" onclick="toggleExpand('${p.id}')">더 보기 ▾</button>
    <div class="post-comfort" id="comfort-${p.id}">${escHtml(p.comfort_text)}</div>
    <div class="post-actions">
      <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}',this)" id="like-${p.id}">
        😤 <span id="likes-${p.id}">${p.likes||0}</span>
      </button>
      <button class="comment-toggle" onclick="toggleComments('${p.id}')">💬 댓글</button>
      <button class="report-btn" onclick="reportPost('${p.id}')">신고</button>
    </div>
    <div class="comments-section" id="comments-${p.id}">
      <div id="comment-list-${p.id}">
        <div style="font-size:12px;color:#555;padding:8px 0">댓글 불러오는 중...</div>
      </div>
      <div class="comment-input-row">
        <input class="comment-input" id="comment-input-${p.id}" placeholder="익명으로 댓글 달기..." maxlength="200">
        <button class="comment-submit" onclick="submitComment('${p.id}')">등록</button>
      </div>
    </div>
  </div>`;
}

function toggleExpand(id) {
  const el=document.getElementById('rage-'+id);
  const btn=el.nextElementSibling;
  const comfort=document.getElementById('comfort-'+id);
  if(el.classList.contains('collapsed')){
    el.classList.remove('collapsed'); btn.textContent='접기 ▴'; comfort.classList.add('visible');
  } else {
    el.classList.add('collapsed'); btn.textContent='더 보기 ▾'; comfort.classList.remove('visible');
  }
}

async function toggleLike(postId, btn) {
  const liked=likedPosts.has(postId);
  const countEl=document.getElementById('likes-'+postId);
  const current=parseInt(countEl.textContent)||0;
  if(liked){
    likedPosts.delete(postId); saveLikes();
    btn.classList.remove('liked');
    countEl.textContent=current-1;
    await api('likes?post_id=eq.'+postId+'&ip_hash=eq.'+ipHash,{method:'DELETE',prefer:''});
  } else {
    likedPosts.add(postId); saveLikes();
    btn.classList.add('liked');
    countEl.textContent=current+1;
    await api('likes',{method:'POST',body:JSON.stringify({post_id:postId,ip_hash:ipHash})});
  }
}

async function toggleComments(postId) {
  const sec=document.getElementById('comments-'+postId);
  sec.classList.toggle('visible');
  if(sec.classList.contains('visible')) await loadComments(postId);
}

async function loadComments(postId) {
  const list=document.getElementById('comment-list-'+postId);
  try {
    const r=await api('comments?post_id=eq.'+postId+'&order=created_at.asc&select=*');
    const comments=await r.json();
    if(!Array.isArray(comments)||comments.length===0){
      list.innerHTML='<div style="font-size:12px;color:#555;padding:8px 0">첫 댓글을 달아보세요!</div>'; return;
    }
    list.innerHTML=comments.map(c=>`
      <div class="comment-item">
        <div class="comment-text">${escHtml(c.content)}</div>
        <div class="comment-time">${timeAgo(c.created_at)}</div>
      </div>`).join('');
  } catch { list.innerHTML='<div style="font-size:12px;color:#555">댓글을 불러올 수 없어요</div>'; }
}

async function submitComment(postId) {
  const input=document.getElementById('comment-input-'+postId);
  const content=input.value.trim();
  if(!content){ showToast('댓글을 입력해주세요'); return; }
  try {
    const r=await api('comments',{method:'POST',body:JSON.stringify({post_id:postId,content})});
    if(r.ok){ input.value=''; await loadComments(postId); showToast('댓글이 등록됐어요'); }
    else throw new Error();
  } catch { showToast('등록 실패. 다시 시도해주세요'); }
}

async function reportPost(postId) {
  if(!confirm('이 게시물을 신고하시겠어요?')) return;
  try {
    await api('reports',{method:'POST',body:JSON.stringify({post_id:postId,reason:'user_report'})});
    showToast('신고가 접수됐어요');
  } catch { showToast('신고 실패. 다시 시도해주세요'); }
}

function setSort(btn, sort) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentSort=sort;
  loadPosts(true);
}

function loadMorePosts() { loadPosts(false); }

function timeAgo(iso) {
  const diff=(Date.now()-new Date(iso))/1000;
  if(diff<60) return '방금 전';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
